# INTEGRATED NETWORK CONFIGURATION
network_integration:
  junction_stations:
    - station: CSMT
      connecting_lines: ["HARBOUR", "CENTRAL_MAIN"]
      platforms: 18
      transfer_time_s: 300
    - station: DR
      connecting_lines: ["WESTERN", "CENTRAL_MAIN"]
      platforms: 8
      transfer_time_s: 180
    - station: KYN
      connecting_lines: ["CENTRAL_MAIN", "CENTRAL_KASARA", "CENTRAL_KARJAT"]
      platforms: 8
      transfer_time_s: 240
    - station: TNA
      connecting_lines: ["CENTRAL_MAIN", "TRANS_HARBOUR"]
      platforms: 10
      transfer_time_s: 300
    - station: CLA
      connecting_lines: ["HARBOUR", "CENTRAL_MAIN"]
      platforms: 8
      transfer_time_s: 240
    - station: PNVL
      connecting_lines: ["HARBOUR", "TRANS_HARBOUR"]
      platforms: 7
      transfer_time_s: 180

  operational_parameters:
    peak_hour_frequency:
      HARBOUR: 120  # 2 minutes
      WESTERN: 180  # 3 minutes
      CENTRAL_MAIN: 120  # 2 minutes
      CENTRAL_KASARA: 600  # 10 minutes
      CENTRAL_KARJAT: 600  # 10 minutes
      TRANS_HARBOUR: 1200  # 20 minutes
    
    off_peak_frequency:
      HARBOUR: 300  # 5 minutes
      WESTERN: 360  # 6 minutes
      CENTRAL_MAIN: 240  # 4 minutes
      CENTRAL_KASARA: 900  # 15 minutes
      CENTRAL_KARJAT: 900  # 15 minutes
      TRANS_HARBOUR: 1800  # 30 minutes

    night_services:
      enabled: true
      frequency_multiplier: 3
      reduced_speed: true
      maintenance_windows:
        - line: WESTERN
          start_time: "01:30"
          end_time: "04:30"
          affected_blocks: ["VR-VTN", "VTN-SAH"]
        - line: HARBOUR
          start_time: "02:00"
          end_time: "05:00"
          affected_blocks: ["MNKD-VSH", "VSH-SNCR"]

# SAFETY AND OPERATIONAL CONSTRAINTS
safety_systems:
  signaling_system: "Automatic Block Signaling (ABS)"
  train_protection: "Train Protection Warning System (TPWS)"
  communication: "Global System for Mobile Communications – Railway (GSM-R)"
  
  speed_restrictions:
    - location: "All platforms"
      speed_limit: 15
      reason: "Platform safety"
    - location: "Sharp curves"
      speed_limit: 40
      reason: "Curve safety"
    - location: "Level crossings"
      speed_limit: 25
      reason: "Road safety"
    - location: "Bridge approaches"
      speed_limit: 60
      reason: "Structural safety"

  emergency_protocols:
    - type: "Signal failure"
      action: "Manual block working"
      speed_limit: 25
    - type: "Track circuit failure"
      action: "Pilot working"
      speed_limit: 40
    - type: "Overhead equipment failure"
      action: "Single line working"
      speed_limit: 15

# MAINTENANCE SCHEDULES
maintenance_windows:
  daily:
    - time: "01:00-05:00"
      type: "Routine inspection"
      lines: ["ALL"]
    - time: "02:00-04:00"
      type: "Track maintenance"
      lines: ["WESTERN_EXTENDED", "HARBOUR_EXTENDED"]
  
  weekly:
    - day: "Sunday"
      time: "23:00-05:00"
      type: "Signal maintenance"
      lines: ["CENTRAL_MAIN", "CENTRAL_KASARA"]
    - day: "Saturday"
      time: "23:30-04:30"
      type: "Overhead equipment maintenance"
      lines: ["TRANS_HARBOUR"]

  monthly:
    - frequency: "First Sunday"
      duration: "6 hours"
      type: "Major track work"
      rotating_lines: true

